apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - api-gateway.yaml
  - db-catalogue.yaml
  - db-utilisateur.yaml
  - frontend.yaml
  - keycloak.yaml
  - secrets.yaml
  - service-catalogue.yaml
  - service-utilisateur.yaml

configMapGenerator:
  - name: catalogue-db-init
    files:
      - ../../service_catalogue/src/init.sql
  - name: user-db-init
    files:
      - ../../service_utilisateur/src/init.sql

generatorOptions:
  disableNameSuffixHash: true
