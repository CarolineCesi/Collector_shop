apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
      - name: api-gateway
        image: collector-gateway
        imagePullPolicy: IfNotPresent
        env:
        - name: CATALOGUE_URL
          value: "http://service-catalogue:3001"
        - name: UTILISATEUR_URL
          value: "http://service-utilisateur:3002"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
