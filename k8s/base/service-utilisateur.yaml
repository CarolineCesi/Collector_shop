apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-utilisateur
  labels:
    app: service-utilisateur
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-utilisateur
  template:
    metadata:
      labels:
        app: service-utilisateur
    spec:
      containers:
      - name: service-utilisateur
        image: service-utilisateur:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD_USER
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_DB_USER
        - name: POSTGRES_HOST
          value: "db-utilisateur"
        ports:
        - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: service-utilisateur
spec:
  selector:
    app: service-utilisateur
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
