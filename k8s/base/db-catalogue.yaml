apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-catalogue
  labels:
    app: postgres-catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-catalogue
  template:
    metadata:
      labels:
        app: postgres-catalogue
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD_CATALOGUE
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_DB_CATALOGUE
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-catalogue-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-catalogue-storage
        persistentVolumeClaim:
          claimName: postgres-catalogue-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db-catalogue
spec:
  selector:
    app: postgres-catalogue
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-catalogue-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
