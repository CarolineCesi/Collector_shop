apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-utilisateur
  labels:
    app: postgres-utilisateur
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-utilisateur
  template:
    metadata:
      labels:
        app: postgres-utilisateur
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD_USER
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_DB_USER
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-utilisateur-storage
          mountPath: /var/lib/postgresql/data
        - name: db-init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: postgres-utilisateur-storage
        persistentVolumeClaim:
          claimName: postgres-utilisateur-pvc
      - name: db-init
        configMap:
          name: user-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: db-utilisateur
spec:
  selector:
    app: postgres-utilisateur
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-utilisateur-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
