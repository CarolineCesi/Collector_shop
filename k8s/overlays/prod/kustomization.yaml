apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: production

commonLabels:
  env: prod

images:
  - name: collector-frontend
    newName: ghcr.io/carolinecesi/collector-frontend
    newTag: prod
  - name: collector-catalogue
    newName: ghcr.io/carolinecesi/collector-catalogue
    newTag: prod
  - name: collector-utilisateur
    newName: ghcr.io/carolinecesi/collector-utilisateur
    newTag: prod
  - name: collector-gateway
    newName: ghcr.io/carolinecesi/collector-gateway
    newTag: prod

patches:
  - target:
      kind: Deployment
      name: service-catalogue
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-catalogue
      spec:
        replicas: 3
  - target:
      kind: Deployment
      name: service-utilisateur
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-utilisateur
      spec:
        replicas: 2
