apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: production

commonLabels:
  env: prod

images:
  - name: frontend
    newName: YOUR_DOCKERHUB_USERNAME/collector-frontend
    newTag: prod
  - name: service-catalogue
    newName: YOUR_DOCKERHUB_USERNAME/collector-catalogue
    newTag: prod
  - name: service-utilisateur
    newName: YOUR_DOCKERHUB_USERNAME/collector-utilisateur
    newTag: prod
  - name: api-gateway
    newName: YOUR_DOCKERHUB_USERNAME/collector-gateway
    newTag: prod

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: service-catalogue
    spec:
      replicas: 3
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: service-utilisateur
    spec:
      replicas: 2
