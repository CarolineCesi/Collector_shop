apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: production

commonLabels:
  env: prod

# Le déploiement utilise désormais les images directes du base pour éviter les erreurs de formatage Kustomize
patches:
  - target:
      kind: Deployment
      name: service-catalogue
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-catalogue
      spec:
        replicas: 3
  - target:
      kind: Deployment
      name: service-utilisateur
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-utilisateur
      spec:
        replicas: 2
