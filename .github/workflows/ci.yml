name: CI Pipeline

# Déclenchement de la pipeline
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1er Job : Vérification du Frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # La version utilisée par vos conteneurs
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances Frontend
        working-directory: ./frontend
        run: npm ci # 'npm ci' est recommandé en CI à la place de 'npm install'

      - name: Build Frontend (Vérification TypeScript et bundling)
        working-directory: ./frontend
        run: npm run build

  # 2ème Job : Vérification de la configuration Docker
  build-docker:
    name: Test Docker Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build Docker images
        # On tente de build via docker-compose pour s'assurer qu'il n'y a pas d'erreur dans les Dockerfile
        run: docker compose build
