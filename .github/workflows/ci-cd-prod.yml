name: CI/CD Prod Environment

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build Frontend
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and Test Frontend
        run: |
          cd frontend
          npm install
          npm test --if-present

      # Build Backend Services
      - name: Build and Test Catalogue
        run: |
          cd service_catalogue
          npm install
          npm test --if-present

      - name: Build and Test Utilisateur
        run: |
          cd service_utilisateur
          npm install
          npm test --if-present

      - name: Build and Test Gateway
        run: |
          cd api_gateway
          npm install
          npm test --if-present

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'

  sonarcloud:
    name: SonarCloud Scan
    needs: security-scan
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build-push:
    needs: sonarcloud
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/collector-frontend:prod

      - name: Build and push Catalogue
        uses: docker/build-push-action@v4
        with:
          context: ./service_catalogue
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/collector-catalogue:prod

      - name: Build and push Utilisateur
        uses: docker/build-push-action@v4
        with:
          context: ./service_utilisateur
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/collector-utilisateur:prod
          
      - name: Build and push Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./api_gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/collector-gateway:prod

  deploy-prod:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
      - name: Deploy to Kubernetes Prod
        run: |
          echo "Simulating deployment to Kubernetes Prod namespace..."
          # kubectl apply -k k8s/overlays/prod
