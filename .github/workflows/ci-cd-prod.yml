name: CI/CD Prod Environment

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      db_catalogue:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: catalogue_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      db_utilisateur:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: utilisateur_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Build Frontend
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and Test Frontend
        run: |
          cd frontend
          npm install
          npm run test:unit --if-present

      # Initialize Databases
      - name: Initialize Databases
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=password psql -h localhost -U postgres -d catalogue_db -f service_catalogue/src/init.sql
          PGPASSWORD=password psql -h localhost -p 5433 -U postgres -d utilisateur_db -f service_utilisateur/src/init.sql

      # Build & Test Catalogue Path
      - name: Build and Test Catalogue
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: catalogue_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: |
          cd service_catalogue
          npm install
          npm test --if-present

      # Build & Test Utilisateur Path
      - name: Build and Test Utilisateur
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: utilisateur_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5433
          JWT_SECRET: "test_secret"
        run: |
          cd service_utilisateur
          npm install
          npm test --if-present

      - name: Build and Test Gateway
        run: |
          cd api_gateway
          npm install
          npm test --if-present

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'

  sonarcloud:
    name: SonarCloud Scan
    needs: security-scan
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build-push:
    needs: sonarcloud
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collector-frontend:prod

      - name: Build and push Catalogue
        uses: docker/build-push-action@v4
        with:
          context: ./service_catalogue
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collector-catalogue:prod

      - name: Build and push Utilisateur
        uses: docker/build-push-action@v4
        with:
          context: ./service_utilisateur
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collector-utilisateur:prod
          
      - name: Build and push Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./api_gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collector-gateway:prod

  deploy-prod:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
      - name: Deploy to Kubernetes Prod
        run: |
          echo "Simulating deployment to Kubernetes Prod namespace..."
          # kubectl apply -k k8s/overlays/prod
